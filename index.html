<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학급 파일함</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f3ef;color:#1c1c1c;min-height:100vh;line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}

.header{background:#fff;border-radius:16px;border:1px solid #e4e3de;padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header-brand{display:flex;align-items:center;gap:12px}
.header-icon{width:40px;height:40px;background:#1c1c1c;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px}
.header-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.header-sub{font-size:12px;color:#999;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.teacher-badge{font-size:12px;font-weight:600;background:#1c1c1c;color:#fff;padding:3px 10px;border-radius:20px}

button{cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:8px 16px;border-radius:10px;border:1px solid #ddddd8;background:#fff;color:#1c1c1c;transition:background .12s,transform .08s;white-space:nowrap}
button:hover{background:#f0efeb}
button:active{transform:scale(.98)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-dark{background:#1c1c1c;color:#fff;border-color:#1c1c1c}
.btn-dark:hover{background:#333}
.btn-sm{font-size:12px;padding:6px 12px}
.btn-full{width:100%;padding:11px;font-size:14px}
.btn-danger{color:#b91c1c;border-color:#f5c5c5}
.btn-danger:hover{background:#fff5f5}
.btn-warn{color:#92400e;border-color:#fde68a;background:#fffbeb}
.btn-warn:hover{background:#fef3c7}

input[type=text],input[type=password]{width:100%;font-family:inherit;font-size:14px;padding:10px 13px;border:1px solid #ddddd8;border-radius:10px;background:#fff;color:#1c1c1c;outline:none;transition:border-color .15s}
input:focus{border-color:#1c1c1c}
input[type=file]{width:100%;font-family:inherit;font-size:13px;padding:10px 13px;border:1.5px dashed #d0cfc8;border-radius:10px;background:#fafaf7;cursor:pointer;color:#555}
input[type=file]:hover{border-color:#aaa;background:#f4f3ef}
label{font-size:13px;color:#555;font-weight:500}

.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab{font-size:13px;padding:7px 14px;border-color:#e4e3de;background:transparent;color:#666;font-weight:400}
.tab.active{background:#1c1c1c;color:#fff;border-color:#1c1c1c;font-weight:500}
.tab:hover:not(.active){background:#efefeb}

.section{background:#fff;border:1px solid #e4e3de;border-radius:14px;padding:20px 22px;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;color:#1c1c1c}
.form{display:flex;flex-direction:column;gap:9px}
.err{font-size:12px;color:#b91c1c;min-height:16px}

.prog-wrap{display:none}
.prog-bar{width:100%;height:4px;background:#e4e3de;border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;background:#1c1c1c;border-radius:3px;transition:width .2s}
.prog-label{font-size:12px;color:#888}

.info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;font-size:13px;color:#1d4ed8;margin-bottom:14px;line-height:1.6}

.board-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.board-count{font-size:13px;color:#888}

.post-row{background:#fff;border:1px solid #e4e3de;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s,border-color .15s;margin-bottom:8px}
.post-row:hover{border-color:#bbb;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.post-icon{width:38px;height:38px;min-width:38px;border-radius:9px;background:#f4f3ef;display:flex;align-items:center;justify-content:center;font-size:17px}
.post-info{flex:1;min-width:0}
.post-title{font-size:14px;font-weight:600;color:#1c1c1c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-meta{font-size:12px;color:#999;margin-top:2px}

.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#666;cursor:pointer;margin-bottom:16px;padding:6px 12px;border-radius:8px;background:#fff;border:1px solid #e4e3de}
.back-btn:hover{background:#f4f3ef}

.file-card{background:#f4f3ef;border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.file-card-icon{font-size:28px}
.file-card-info{flex:1;min-width:0}
.file-card-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-card-meta{font-size:12px;color:#888;margin-top:2px}

.tc-file-row{background:#fff;border:1px solid #e4e3de;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tc-file-row-info{flex:1;min-width:0}
.tc-file-row-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-file-row-meta{font-size:12px;color:#999;margin-top:2px}

.reset-section{margin-top:18px;padding-top:16px;border-top:1px solid #e4e3de}
.reset-row{display:flex;gap:7px;margin-top:8px}
.reset-row input{flex:1;font-size:13px;padding:8px 11px}

.empty{text-align:center;padding:50px 20px;color:#ccc;font-size:14px}
.empty-icon{font-size:34px;margin-bottom:10px}

.success-box{text-align:center;padding:36px 20px}
.success-icon{font-size:44px;margin-bottom:12px}
.success-title{font-size:15px;font-weight:600;color:#1c1c1c}
.success-sub{font-size:13px;color:#888;margin-top:5px}

.login-wrap{max-width:360px;margin:0 auto}

.divider{height:1px;background:#e4e3de;margin:16px 0}

@media(max-width:500px){
  .header{flex-direction:column;align-items:flex-start}
  .board-header{flex-direction:column;align-items:flex-start;gap:8px}
  .reset-row{flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ★ Firebase 설정 ★ -->
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAnizrBWkqStaoWxIOpd8HFUS_CuqXjw2k",
  authDomain:        "sindong-informatics.firebaseapp.com",
  databaseURL:       "https://sindong-informatics-default-rtdb.firebaseio.com",
  projectId:         "sindong-informatics",
  storageBucket:     "sindong-informatics.firebasestorage.app",
  messagingSenderId: "542931253736",
  appId:             "1:542931253736:web:d83620fe9079c3f0998c5d"
};
</script>
<div id="root"><div style="text-align:center;padding:80px;color:#ccc;font-size:14px">로딩 중...</div></div>
</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db      = firebase.database();
const storage = firebase.storage();

/* ── 상태 ── */
let view         = 'board';
let studentTab   = 'board';
let teacherTab   = 'board';
let isTeacher    = false;
let isFirstSetup = false;
let posts        = [];
let teacherFiles = [];
let selectedPost = null;
let postUnlocked = false;

/* ── 유틸 ── */
async function sha256(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function fmtDate(iso){return new Date(iso).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fileIcon(name){
  const e=(name||'').split('.').pop().toLowerCase();
  return {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',
          png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',zip:'📦',rar:'📦',hwp:'📃',
          mp4:'🎬',mp3:'🎵',txt:'📄'}[e]||'📁';
}
function dl(name,url){const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}

/* ── Firebase ── */
async function getAuth(){const s=await db.ref('auth/teacher').get();return s.exists()?s.val():null;}
async function loadPosts(){
  const s=await db.ref('posts').get();
  if(!s.exists()){posts=[];return;}
  posts=Object.entries(s.val()).map(([id,v])=>({id,...v})).sort((a,b)=>b.uploadedAt.localeCompare(a.uploadedAt));
}
async function loadTeacherFiles(){
  const s=await db.ref('teacherFiles').get();
  if(!s.exists()){teacherFiles=[];return;}
  teacherFiles=Object.entries(s.val()).map(([id,v])=>({id,...v})).sort((a,b)=>b.uploadedAt.localeCompare(a.uploadedAt));
}
async function loadAll(){await Promise.all([loadPosts(),loadTeacherFiles()]);}

async function init(){
  try{const auth=await getAuth();isFirstSetup=!auth;await loadAll();}catch(e){console.error(e);}
  render();
}

/* ════════════ 렌더 ════════════ */
function render(){
  const headerRight = isTeacher
    ? `<div class="teacher-badge">👩‍🏫 선생님</div><button class="btn-sm" onclick="logoutTeacher()">로그아웃</button>`
    : `<button class="btn-sm" onclick="go('teacher-login')">👩‍🏫 선생님 로그인</button>`;

  let body='';
  if     (view==='board')         body=renderBoard();
  else if(view==='new-post')      body=renderNewPost();
  else if(view==='post-detail')   body=renderPostDetail();
  else if(view==='teacher-login') body=renderLogin();
  else if(view==='teacher')       body=renderTeacher();

  document.getElementById('root').innerHTML=`
    <div class="header">
      <div class="header-brand">
        <div class="header-icon">📂</div>
        <div><div class="header-title">학급 파일함</div><div class="header-sub">게시판 · 선생님 파일 다운로드</div></div>
      </div>
      <div class="header-right">${headerRight}</div>
    </div>${body}`;
  bindEvents();
}

function go(v,extra={}){
  view=v;
  if(extra.post){selectedPost=extra.post;postUnlocked=false;}
  render();
}
function logoutTeacher(){isTeacher=false;view='board';render();}
function tab(label,key,active,fn){return `<button class="tab${active===key?' active':''}" onclick="${fn}">${label}</button>`;}

/* ════════════ 학생 게시판 ════════════ */
function renderBoard(){
  const tabs=`<div class="tabs">
    ${tab('📋 게시판','board',studentTab,"setStTab('board')")}
    ${tab('📥 선생님 파일','tf',studentTab,"setStTab('tf')")}
  </div>`;

  if(studentTab==='tf'){
    if(!teacherFiles.length) return tabs+`<div class="empty"><div class="empty-icon">📭</div>선생님이 올린 파일이 없습니다.</div>`;
    return tabs+teacherFiles.map(f=>`
      <div class="tc-file-row">
        <div class="post-icon">${fileIcon(f.name)}</div>
        <div class="tc-file-row-info">
          <div class="tc-file-row-name">${esc(f.name)}</div>
          <div class="tc-file-row-meta">${fmtSize(f.size)} · ${fmtDate(f.uploadedAt)}</div>
        </div>
        <button class="btn-dark btn-sm" data-tcdl="${f.id}">다운로드</button>
      </div>`).join('');
  }

  const list = posts.length===0
    ? `<div class="empty"><div class="empty-icon">📭</div>아직 게시물이 없습니다.<br><br><button class="btn-dark btn-sm" onclick="go('new-post')">+ 첫 게시물 올리기</button></div>`
    : posts.map(p=>`
      <div class="post-row" data-pid="${p.id}">
        <div class="post-icon">${fileIcon(p.fileName)}</div>
        <div class="post-info">
          <div class="post-title">${esc(p.title)}</div>
          <div class="post-meta">${esc(p.authorName)} · ${fmtDate(p.uploadedAt)} · ${fmtSize(p.fileSize)}</div>
        </div>
        <span style="font-size:15px;color:#ccc">🔒</span>
      </div>`).join('');

  return tabs+`
    <div class="board-header">
      <span class="board-count">게시물 ${posts.length}개</span>
      <button class="btn-dark btn-sm" onclick="go('new-post')">+ 게시물 올리기</button>
    </div>${list}`;
}
function setStTab(t){studentTab=t;render();}

/* ════════════ 게시물 작성 ════════════ */
function renderNewPost(){
  return `
    <div class="back-btn" onclick="go('board')">← 게시판으로</div>
    <div class="section">
      <div class="section-title">📤 새 게시물 올리기</div>
      <div class="info">비밀번호를 알아야 파일을 다운로드할 수 있습니다.<br>비밀번호는 선생님께 따로 알려드리세요.</div>
      <div class="form" id="np-form">
        <label>이름</label>
        <input id="np-name" type="text" placeholder="홍길동" autocomplete="off"/>
        <label>게시물 제목</label>
        <input id="np-title" type="text" placeholder="예: 3번 과제 제출합니다" autocomplete="off"/>
        <label>비밀번호 설정</label>
        <input id="np-pw" type="password" placeholder="비밀번호를 설정하세요" autocomplete="new-password"/>
        <label>파일 선택 <span style="color:#aaa;font-weight:400">(최대 50MB)</span></label>
        <input id="np-file" type="file"/>
        <div class="prog-wrap" id="np-prog">
          <div class="prog-label">업로드 중... <span id="np-pct">0%</span></div>
          <div class="prog-bar"><div class="prog-fill" id="np-pfill" style="width:0%"></div></div>
        </div>
        <div id="np-err" class="err"></div>
        <button id="np-submit" class="btn-dark btn-full" style="margin-top:4px">게시물 올리기</button>
      </div>
    </div>`;
}

/* ════════════ 게시물 상세 ════════════ */
function renderPostDetail(){
  const p=selectedPost;
  if(!p) return `<div class="back-btn" onclick="go('board')">← 게시판으로</div><div class="empty">게시물을 찾을 수 없습니다.</div>`;
  const back=`<div class="back-btn" onclick="go('board')">← 게시판으로</div>`;

  /* 선생님 또는 비밀번호 통과 */
  if(isTeacher||postUnlocked){
    const teacherControls = isTeacher ? `
      <div class="reset-section">
        <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:4px">🔐 학생 비밀번호 초기화</div>
        <div style="font-size:12px;color:#999;margin-bottom:8px">빈칸으로 두면 <b>0000</b>으로 초기화됩니다.</div>
        <div class="reset-row">
          <input id="reset-pw" type="password" placeholder="새 비밀번호 (빈칸 = 0000)" autocomplete="new-password"/>
          <button id="reset-btn" class="btn-warn">초기화</button>
        </div>
        <div id="reset-msg" style="font-size:12px;margin-top:7px;min-height:16px"></div>
      </div>
      <div class="divider"></div>
      <button id="del-post-btn" class="btn-danger btn-sm">이 게시물 삭제</button>` : '';

    return back+`
      <div class="section">
        <div class="section-title">${esc(p.title)}</div>
        <div style="font-size:13px;color:#999;margin-bottom:16px">${esc(p.authorName)} · ${fmtDate(p.uploadedAt)}</div>
        <div class="file-card">
          <div class="file-card-icon">${fileIcon(p.fileName)}</div>
          <div class="file-card-info">
            <div class="file-card-name">${esc(p.fileName)}</div>
            <div class="file-card-meta">${fmtSize(p.fileSize)}</div>
          </div>
        </div>
        <button id="pd-dl" class="btn-dark btn-full">📥 파일 다운로드</button>
        ${teacherControls}
      </div>`;
  }

  /* 비밀번호 입력 */
  return back+`
    <div class="section" style="max-width:360px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div class="post-icon">${fileIcon(p.fileName)}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${esc(p.title)}</div>
          <div style="font-size:12px;color:#999">${esc(p.authorName)} · ${fmtDate(p.uploadedAt)}</div>
        </div>
      </div>
      <div class="form">
        <label>비밀번호를 입력하면 파일을 다운로드할 수 있습니다.</label>
        <input id="pd-pw" type="password" placeholder="비밀번호 입력" autocomplete="off"/>
        <div id="pd-err" class="err"></div>
        <button id="pd-confirm" class="btn-dark btn-full">확인</button>
      </div>
    </div>`;
}

/* ════════════ 선생님 로그인 ════════════ */
function renderLogin(){
  if(isFirstSetup) return `
    <div class="login-wrap">
      <div class="section">
        <div class="section-title">🔐 선생님 비밀번호 초기 설정</div>
        <div class="info">처음 사용하시네요. 선생님 비밀번호를 설정해주세요.</div>
        <div class="form">
          <label>새 비밀번호</label>
          <input id="tl-pw" type="password" placeholder="4자 이상" autocomplete="new-password"/>
          <label>비밀번호 확인</label>
          <input id="tl-pw2" type="password" placeholder="동일하게 입력" autocomplete="new-password"/>
          <div id="tl-err" class="err"></div>
          <button id="tl-btn" class="btn-dark btn-full" style="margin-top:4px">설정 후 로그인</button>
        </div>
      </div>
    </div>`;

  return `
    <div class="login-wrap">
      <div class="section">
        <div class="section-title">👩‍🏫 선생님 로그인</div>
        <div class="form">
          <label>비밀번호</label>
          <input id="tl-pw" type="password" placeholder="비밀번호" autocomplete="current-password"/>
          <div id="tl-err" class="err"></div>
          <button id="tl-btn" class="btn-dark btn-full" style="margin-top:4px">로그인</button>
        </div>
      </div>
    </div>`;
}

/* ════════════ 선생님 대시보드 ════════════ */
function renderTeacher(){
  const tabs=`<div class="tabs">
    ${tab(`📋 학생 게시판`,'board',teacherTab,"setTcTab('board')")}
    ${tab('📤 파일 올리기','upload',teacherTab,"setTcTab('upload')")}
    ${tab('📋 내 파일 관리','myfiles',teacherTab,"setTcTab('myfiles')")}
    ${tab('🔐 비밀번호 변경','settings',teacherTab,"setTcTab('settings')")}
  </div>`;

  let body='';

  if(teacherTab==='board'){
    if(!posts.length){
      body=`<div class="empty"><div class="empty-icon">📭</div>학생이 올린 게시물이 없습니다.</div>`;
    } else {
      body=`<div style="font-size:12px;color:#999;margin-bottom:10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px">
        🔓 선생님은 비밀번호 없이 모든 게시물을 열람할 수 있습니다.
      </div>`
      +posts.map(p=>`
        <div class="post-row" data-pid="${p.id}">
          <div class="post-icon">${fileIcon(p.fileName)}</div>
          <div class="post-info">
            <div class="post-title">${esc(p.title)}</div>
            <div class="post-meta">${esc(p.authorName)} · ${fmtDate(p.uploadedAt)} · ${fmtSize(p.fileSize)}</div>
          </div>
          <span style="font-size:14px;color:#34d399">🔓</span>
        </div>`).join('');
    }
  }

  else if(teacherTab==='upload'){
    body=`
      <div class="section">
        <div class="section-title">학생에게 파일 공유하기</div>
        <div class="info">학생들이 로그인 없이 바로 다운로드할 수 있습니다. (최대 50MB)</div>
        <div class="form">
          <label>파일 선택</label>
          <input id="tc-file" type="file"/>
          <div class="prog-wrap" id="tc-prog">
            <div class="prog-label">업로드 중... <span id="tc-pct">0%</span></div>
            <div class="prog-bar"><div class="prog-fill" id="tc-pfill" style="width:0%"></div></div>
          </div>
          <div id="tc-err" class="err"></div>
          <button id="tc-upload" class="btn-dark btn-full" style="margin-top:4px">학생에게 공유하기</button>
        </div>
      </div>`;
  }

  else if(teacherTab==='myfiles'){
    if(!teacherFiles.length){
      body=`<div class="empty"><div class="empty-icon">📭</div>올린 파일이 없습니다.</div>`;
    } else {
      body=teacherFiles.map(f=>`
        <div class="tc-file-row">
          <div class="post-icon">${fileIcon(f.name)}</div>
          <div class="tc-file-row-info">
            <div class="tc-file-row-name">${esc(f.name)}</div>
            <div class="tc-file-row-meta">${fmtSize(f.size)} · ${fmtDate(f.uploadedAt)}</div>
          </div>
          <button class="btn-sm btn-danger" data-del="${f.id}" data-dpath="${esc(f.storagePath||'')}" data-dname="${esc(f.name)}">삭제</button>
        </div>`).join('');
    }
  }

  else if(teacherTab==='settings'){
    body=`
      <div class="section" style="max-width:340px">
        <div class="section-title">비밀번호 변경</div>
        <div class="form">
          <label>현재 비밀번호</label>
          <input id="cp-cur" type="password" autocomplete="current-password"/>
          <label>새 비밀번호 (4자 이상)</label>
          <input id="cp-new" type="password" autocomplete="new-password"/>
          <label>새 비밀번호 확인</label>
          <input id="cp-con" type="password" autocomplete="new-password"/>
          <div id="cp-msg" style="font-size:13px;min-height:16px"></div>
          <button id="cp-btn" class="btn-dark" style="margin-top:4px">비밀번호 변경</button>
        </div>
      </div>`;
  }

  return tabs+body;
}
function setTcTab(t){teacherTab=t;render();}

/* ════════════ 이벤트 ════════════ */
function bindEvents(){

  /* 게시물 클릭 (학생 게시판 & 선생님 게시판) */
  document.querySelectorAll('[data-pid]').forEach(row=>{
    row.addEventListener('click',()=>{
      const p=posts.find(x=>x.id===row.dataset.pid);
      if(p) go('post-detail',{post:p});
    });
  });

  /* 선생님 공유 파일 다운 */
  document.querySelectorAll('[data-tcdl]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const f=teacherFiles.find(x=>x.id===btn.dataset.tcdl);if(!f)return;
      btn.textContent='...';btn.disabled=true;
      try{dl(f.name,f.url||await storage.ref(f.storagePath).getDownloadURL());}
      catch(e){alert('다운로드 실패: '+e.message);}
      btn.textContent='다운로드';btn.disabled=false;
    });
  });

  /* 게시물 작성 */
  document.getElementById('np-submit')?.addEventListener('click',async()=>{
    const name=document.getElementById('np-name').value.trim();
    const title=document.getElementById('np-title').value.trim();
    const pw=document.getElementById('np-pw').value.trim();
    const file=document.getElementById('np-file').files[0];
    const err=document.getElementById('np-err');
    err.textContent='';
    if(!name){err.textContent='이름을 입력하세요.';return;}
    if(!title){err.textContent='제목을 입력하세요.';return;}
    if(!pw){err.textContent='비밀번호를 설정하세요.';return;}
    if(!file){err.textContent='파일을 선택하세요.';return;}
    if(file.size>50*1024*1024){err.textContent='50MB 이하 파일만 가능합니다.';return;}
    const btn=document.getElementById('np-submit');
    btn.disabled=true;document.getElementById('np-prog').style.display='block';
    try{
      const passwordHash=await sha256(pw);
      const id=genId();const path=`posts/${id}/${file.name}`;
      const ref=storage.ref(path);const task=ref.put(file);
      await new Promise((res,rej)=>task.on('state_changed',snap=>{
        const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
        document.getElementById('np-pct').textContent=pct+'%';
        document.getElementById('np-pfill').style.width=pct+'%';
      },rej,res));
      const url=await ref.getDownloadURL();
      await db.ref(`posts/${id}`).set({title,authorName:name,fileName:file.name,fileSize:file.size,uploadedAt:new Date().toISOString(),passwordHash,storagePath:path,url});
      await loadPosts();
      document.getElementById('np-form').innerHTML=`
        <div class="success-box">
          <div class="success-icon">✅</div>
          <div class="success-title">게시물이 등록됐습니다!</div>
          <div class="success-sub">비밀번호를 아는 사람만 파일을 다운로드할 수 있습니다.</div>
          <button onclick="go('board')" style="margin-top:18px">← 게시판으로</button>
        </div>`;
    }catch(e){
      err.textContent='업로드 실패: '+e.message;
      document.getElementById('np-prog').style.display='none';
      btn.disabled=false;
    }
  });

  /* 비밀번호 확인 (학생) */
  const pdConfirm=document.getElementById('pd-confirm');
  if(pdConfirm){
    const check=async()=>{
      const pw=document.getElementById('pd-pw').value;
      const err=document.getElementById('pd-err');
      if(!pw){err.textContent='비밀번호를 입력하세요.';return;}
      pdConfirm.textContent='...';pdConfirm.disabled=true;
      try{
        if(await sha256(pw)===selectedPost.passwordHash){postUnlocked=true;render();}
        else{err.textContent='비밀번호가 틀렸습니다.';pdConfirm.textContent='확인';pdConfirm.disabled=false;}
      }catch(e){err.textContent='오류';pdConfirm.textContent='확인';pdConfirm.disabled=false;}
    };
    pdConfirm.addEventListener('click',check);
    document.getElementById('pd-pw')?.addEventListener('keydown',e=>e.key==='Enter'&&check());
  }

  /* 파일 다운로드 (게시물 상세) */
  document.getElementById('pd-dl')?.addEventListener('click',async function(){
    this.textContent='...';this.disabled=true;
    try{dl(selectedPost.fileName,selectedPost.url||await storage.ref(selectedPost.storagePath).getDownloadURL());}
    catch(e){alert('다운로드 실패: '+e.message);}
    this.textContent='📥 파일 다운로드';this.disabled=false;
  });

  /* 선생님 — 비밀번호 초기화 */
  document.getElementById('reset-btn')?.addEventListener('click',async()=>{
    const input=document.getElementById('reset-pw');
    const newPw=input.value||'0000';
    const msg=document.getElementById('reset-msg');
    const btn=document.getElementById('reset-btn');
    btn.disabled=true;
    try{
      const h=await sha256(newPw);
      await db.ref(`posts/${selectedPost.id}/passwordHash`).set(h);
      selectedPost.passwordHash=h;
      const label=input.value?`"${input.value}"`:'0000';
      msg.style.color='#166534';
      msg.textContent=`✓ 비밀번호가 ${label} 으로 초기화됐습니다. 학생에게 알려주세요.`;
      input.value='';
    }catch(e){msg.style.color='#b91c1c';msg.textContent='오류: '+e.message;}
    btn.disabled=false;
  });

  /* 선생님 — 게시물 삭제 */
  document.getElementById('del-post-btn')?.addEventListener('click',async()=>{
    if(!confirm(`"${selectedPost.title}" 게시물을 삭제할까요?`))return;
    try{
      if(selectedPost.storagePath) await storage.ref(selectedPost.storagePath).delete().catch(()=>{});
      await db.ref(`posts/${selectedPost.id}`).remove();
      await loadPosts();
      teacherTab='board';go('teacher');
    }catch(e){alert('삭제 실패: '+e.message);}
  });

  /* 선생님 로그인 */
  const tlBtn=document.getElementById('tl-btn');
  if(tlBtn){
    const doLogin=async()=>{
      const pw=document.getElementById('tl-pw').value;
      const err=document.getElementById('tl-err');
      tlBtn.textContent='...';tlBtn.disabled=true;err.textContent='';
      try{
        if(isFirstSetup){
          const pw2=document.getElementById('tl-pw2').value;
          if(!pw||pw.length<4){err.textContent='4자 이상 입력하세요.';tlBtn.textContent='설정 후 로그인';tlBtn.disabled=false;return;}
          if(pw!==pw2){err.textContent='비밀번호가 일치하지 않습니다.';tlBtn.textContent='설정 후 로그인';tlBtn.disabled=false;return;}
          await db.ref('auth/teacher').set({h:await sha256(pw)});
          isFirstSetup=false;
        } else {
          const h=await sha256(pw);const auth=await getAuth();
          if(!auth||auth.h!==h){err.textContent='비밀번호가 틀렸습니다.';tlBtn.textContent='로그인';tlBtn.disabled=false;return;}
        }
        isTeacher=true;view='teacher';teacherTab='board';
        await loadAll();render();
      }catch(e){err.textContent='오류: '+e.message;tlBtn.textContent=isFirstSetup?'설정 후 로그인':'로그인';tlBtn.disabled=false;}
    };
    tlBtn.addEventListener('click',doLogin);
    document.getElementById('tl-pw')?.addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
  }

  /* 선생님 — 파일 올리기 */
  document.getElementById('tc-upload')?.addEventListener('click',async()=>{
    const file=document.getElementById('tc-file').files[0];
    if(!file){alert('파일을 선택하세요.');return;}
    if(file.size>50*1024*1024){document.getElementById('tc-err').textContent='50MB 이하만 가능합니다.';return;}
    const btn=document.getElementById('tc-upload');
    btn.disabled=true;document.getElementById('tc-prog').style.display='block';
    document.getElementById('tc-err').textContent='';
    try{
      const id=genId();const path=`teacherFiles/${id}/${file.name}`;
      const ref=storage.ref(path);const task=ref.put(file);
      await new Promise((res,rej)=>task.on('state_changed',snap=>{
        const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
        document.getElementById('tc-pct').textContent=pct+'%';
        document.getElementById('tc-pfill').style.width=pct+'%';
      },rej,res));
      const url=await ref.getDownloadURL();
      await db.ref(`teacherFiles/${id}`).set({name:file.name,size:file.size,uploadedAt:new Date().toISOString(),storagePath:path,url});
      await loadTeacherFiles();teacherTab='myfiles';render();
    }catch(e){document.getElementById('tc-err').textContent='업로드 실패: '+e.message;document.getElementById('tc-prog').style.display='none';btn.disabled=false;}
  });

  /* 선생님 — 공유 파일 삭제 */
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm(`"${btn.dataset.dname}" 을 삭제할까요?`))return;
      btn.disabled=true;
      try{
        if(btn.dataset.dpath) await storage.ref(btn.dataset.dpath).delete().catch(()=>{});
        await db.ref(`teacherFiles/${btn.dataset.del}`).remove();
        await loadTeacherFiles();render();
      }catch(e){alert('삭제 실패: '+e.message);}
    });
  });

  /* 선생님 — 비밀번호 변경 */
  document.getElementById('cp-btn')?.addEventListener('click',async()=>{
    const cur=document.getElementById('cp-cur').value;
    const nw=document.getElementById('cp-new').value;
    const con=document.getElementById('cp-con').value;
    const msg=document.getElementById('cp-msg');
    const setMsg=(t,ok)=>{msg.style.color=ok?'#166534':'#b91c1c';msg.textContent=t;};
    if(!cur||!nw||!con){setMsg('모두 입력해주세요.',false);return;}
    if(nw!==con){setMsg('새 비밀번호가 일치하지 않습니다.',false);return;}
    if(nw.length<4){setMsg('4자 이상 입력하세요.',false);return;}
    try{
      const curH=await sha256(cur);const auth=await getAuth();
      if(!auth||auth.h!==curH){setMsg('현재 비밀번호가 틀렸습니다.',false);return;}
      await db.ref('auth/teacher').set({h:await sha256(nw)});
      setMsg('✓ 비밀번호가 변경됐습니다.',true);
      ['cp-cur','cp-new','cp-con'].forEach(id=>document.getElementById(id).value='');
    }catch(e){setMsg('오류: '+e.message,false);}
  });
}

init();
</script>
</body>
</html>
