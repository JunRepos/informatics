<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학급 파일함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f3ef;
  color: #1c1c1c;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Layout ── */
.wrap { max-width: 740px; margin: 0 auto; padding: 28px 16px 60px; }

/* ── Header ── */
.header {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e4e3de;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 42px; height: 42px;
  background: #1c1c1c;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.header-sub { font-size: 12px; color: #888; margin-top: 1px; }

/* ── Buttons ── */
button {
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 10px;
  border: 1px solid #ddddd8;
  background: #fff;
  color: #1c1c1c;
  transition: background .12s, transform .08s;
  white-space: nowrap;
}
button:hover { background: #f4f3ef; }
button:active { transform: scale(.98); }
button:disabled { opacity: .45; cursor: not-allowed; }
.btn-dark { background: #1c1c1c; color: #fff; border-color: #1c1c1c; }
.btn-dark:hover { background: #333; }
.btn-danger { color: #b91c1c; border-color: #f5c5c5; }
.btn-danger:hover { background: #fff5f5; }
.btn-sm { font-size: 13px; padding: 7px 14px; }
.btn-full { width: 100%; padding: 12px; font-size: 15px; }

/* ── Inputs ── */
input[type=text], input[type=password] {
  width: 100%;
  font-family: inherit;
  font-size: 14px;
  padding: 10px 14px;
  border: 1px solid #ddddd8;
  border-radius: 10px;
  background: #fff;
  color: #1c1c1c;
  outline: none;
  transition: border-color .15s;
}
input:focus { border-color: #1c1c1c; }
input[type=file] {
  width: 100%;
  font-family: inherit;
  font-size: 13px;
  padding: 10px 14px;
  border: 1.5px dashed #d0cfc8;
  border-radius: 10px;
  background: #fafaf7;
  cursor: pointer;
  color: #555;
}
input[type=file]:hover { border-color: #aaa; background: #f4f3ef; }
label { font-size: 13px; color: #555; font-weight: 500; }

/* ── Tabs ── */
.tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  font-size: 13px;
  padding: 7px 14px;
  border-color: #e4e3de;
  background: transparent;
  color: #666;
  font-weight: 400;
}
.tab.active { background: #1c1c1c; color: #fff; border-color: #1c1c1c; font-weight: 500; }
.tab:hover:not(.active) { background: #efefeb; }

/* ── Cards ── */
.card {
  background: #fff;
  border: 1px solid #e4e3de;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.card-stack { display: flex; flex-direction: column; gap: 8px; }
.card-icon {
  width: 40px; height: 40px; min-width: 40px;
  border-radius: 10px;
  background: #f4f3ef;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.card-title { font-size: 14px; font-weight: 600; color: #1c1c1c; }
.card-meta { font-size: 12px; color: #999; margin-top: 2px; }

/* ── Info / Alert ── */
.info {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 10px;
  padding: 11px 15px;
  font-size: 13px;
  color: #1d4ed8;
  margin-bottom: 16px;
  line-height: 1.5;
}
.alert-warn {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 10px;
  padding: 11px 15px;
  font-size: 13px;
  color: #92400e;
}

/* ── Form ── */
.form { display: flex; flex-direction: column; gap: 10px; }
.form-section {
  background: #fff;
  border: 1px solid #e4e3de;
  border-radius: 16px;
  padding: 22px 24px;
}
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1c1c1c; }
.err { font-size: 13px; color: #b91c1c; min-height: 16px; }

/* ── Progress ── */
.prog-wrap { display: none; }
.prog-bar { width: 100%; height: 5px; background: #e4e3de; border-radius: 3px; overflow: hidden; margin-top: 6px; }
.prog-fill { height: 100%; background: #1c1c1c; border-radius: 3px; transition: width .2s; }
.prog-label { font-size: 12px; color: #888; }

/* ── Student submission card ── */
.sub-card {
  background: #fff;
  border: 1px solid #e4e3de;
  border-radius: 14px;
  padding: 16px 20px;
}
.sub-pw-row { display: flex; gap: 8px; margin-top: 12px; }
.sub-pw-row input { flex: 1; font-size: 13px; padding: 8px 12px; }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 50px 20px;
  color: #bbb;
  font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── Success ── */
.success-state { text-align: center; padding: 40px 20px; }
.success-icon { font-size: 48px; margin-bottom: 14px; }
.success-title { font-size: 16px; font-weight: 600; color: #1c1c1c; }
.success-sub { font-size: 13px; color: #888; margin-top: 6px; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }

/* ── Badge ── */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #f0fdf4;
  color: #166534;
  border: 1px solid #bbf7d0;
  vertical-align: middle;
  margin-left: 6px;
}

/* ── Login box ── */
.login-wrap { max-width: 380px; margin: 0 auto; }

/* ── Scrollable list ── */
.list-scroll { max-height: 600px; overflow-y: auto; }

/* Responsive */
@media (max-width: 500px) {
  .header { flex-direction: column; align-items: flex-start; }
  .tabs { gap: 4px; }
  .tab { font-size: 12px; padding: 6px 10px; }
  .sub-pw-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ★★★ 아래 FIREBASE_CONFIG를 채워주세요 ★★★ -->
  <script>

  projectId:         "sindong-informatics",

  <div id="root"><div class="loading">로딩 중...</div></div>
</div>

<script>
// ── Firebase 초기화 ──
try {
  firebase.initializeApp(FIREBASE_CONFIG);
} catch(e) {
  document.getElementById('root').innerHTML =
    '<div class="form-section" style="text-align:center;padding:40px">' +
    '<div style="font-size:32px;margin-bottom:14px">⚙️</div>' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:8px">Firebase 설정이 필요합니다</div>' +
    '<div style="font-size:13px;color:#666;line-height:1.7">index.html 파일 상단의<br>FIREBASE_CONFIG를 채워주세요.<br>README.md 를 참고하세요.</div>' +
    '</div>';
  throw e;
}
const db      = firebase.database();
const storage = firebase.storage();

// ── 앱 상태 ──
let view        = 'student';
let studentTab  = 'download';
let teacherTab  = 'upload';
let teacherFiles= [];
let studentFiles= [];
let isFirstSetup= false;

// ── 유틸 ──
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
function fmtDate(iso) {
  return new Date(iso).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📋', pptx:'📋',
                png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', zip:'📦', rar:'📦', hwp:'📃',
                mp4:'🎬', mp3:'🎵', txt:'📄' };
  return map[ext] || '📁';
}
function triggerDownload(name, url) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── Firebase helpers ──
async function getAuth()       { const s = await db.ref('auth/teacher').get(); return s.exists() ? s.val() : null; }
async function loadTeacherFiles() {
  const s = await db.ref('teacherFiles').get();
  if (!s.exists()) { teacherFiles = []; return; }
  teacherFiles = Object.entries(s.val()).map(([id,v])=>({id,...v}))
    .sort((a,b)=>b.uploadedAt.localeCompare(a.uploadedAt));
}
async function loadStudentFiles() {
  const s = await db.ref('studentFiles').get();
  if (!s.exists()) { studentFiles = []; return; }
  studentFiles = Object.entries(s.val()).map(([id,v])=>({id,...v}))
    .sort((a,b)=>b.uploadedAt.localeCompare(a.uploadedAt));
}
async function loadAll() { await Promise.all([loadTeacherFiles(), loadStudentFiles()]); }

// ── 초기화 ──
async function init() {
  try {
    const auth = await getAuth();
    isFirstSetup = !auth;
    await loadAll();
  } catch(e) {
    console.error(e);
  }
  render();
}

// ── 렌더 ──
function render() {
  const headerBtn = view === 'student'
    ? `<button onclick="switchView('teacher-login')" class="btn-sm">👩‍🏫 선생님 로그인</button>`
    : `<button onclick="switchView('student')"       class="btn-sm">← 학생 페이지</button>`;

  let body = '';
  if      (view === 'student')       body = renderStudent();
  else if (view === 'teacher-login') body = renderLogin();
  else if (view === 'teacher')       body = renderTeacher();

  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="header-brand">
        <div class="header-icon">📂</div>
        <div>
          <div class="header-title">학급 파일함</div>
          <div class="header-sub">선생님 파일 다운로드 · 과제 제출</div>
        </div>
      </div>
      ${headerBtn}
    </div>
    ${body}`;

  bindEvents();
}

function switchView(v) { view = v; render(); }
function setStTab(t)   { studentTab = t; render(); }
function setTcTab(t)   { teacherTab = t; render(); }

function tabBtn(label, key, active, fn) {
  return `<button class="tab${active===key?' active':''}" onclick="${fn}">${label}</button>`;
}

// ══════════════════════════
// 학생 화면
// ══════════════════════════
function renderStudent() {
  const tabs = `<div class="tabs">
    ${tabBtn('📥 선생님 파일',  'download', studentTab, "setStTab('download')")}
    ${tabBtn('📤 과제 제출',    'submit',   studentTab, "setStTab('submit')")}
  </div>`;

  if (studentTab === 'download') {
    if (!teacherFiles.length) return tabs + `
      <div class="empty">
        <div class="empty-icon">📭</div>
        선생님이 올린 파일이 아직 없습니다.
      </div>`;

    const rows = teacherFiles.map(f => `
      <div class="card">
        <div class="card-icon">${fileIcon(f.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
          <div class="card-meta">${fmtSize(f.size)} · ${fmtDate(f.uploadedAt)}</div>
        </div>
        <button class="btn-sm btn-dark" data-dl="${f.id}">다운로드</button>
      </div>`).join('');
    return tabs + `<div class="card-stack">${rows}</div>`;

  } else {
    return tabs + `
      <div class="form-section">
        <div class="section-title">📤 과제 제출</div>
        <div class="info">비밀번호는 선생님께 따로 알려드리세요.<br>선생님이 이 비밀번호로 파일을 확인합니다.</div>
        <div class="form" id="st-form">
          <label>이름</label>
          <input id="st-name" type="text" placeholder="홍길동" autocomplete="off" />
          <label>비밀번호 설정 <span style="color:#aaa;font-weight:400">(선생님께만 알려주세요)</span></label>
          <input id="st-pw" type="password" placeholder="예: 강아지123" autocomplete="new-password" />
          <label>파일 선택 <span style="color:#aaa;font-weight:400">(최대 50MB)</span></label>
          <input id="st-file" type="file" />
          <div class="prog-wrap" id="st-prog">
            <div class="prog-label">업로드 중... <span id="st-pct">0%</span></div>
            <div class="prog-bar"><div class="prog-fill" id="st-pfill" style="width:0%"></div></div>
          </div>
          <div id="st-err" class="err"></div>
          <button id="st-submit" class="btn-dark btn-full" style="margin-top:4px">제출하기</button>
        </div>
      </div>`;
  }
}

// ══════════════════════════
// 선생님 로그인
// ══════════════════════════
function renderLogin() {
  if (isFirstSetup) return `
    <div class="login-wrap">
      <div class="form-section">
        <div class="section-title">🔐 초기 설정</div>
        <div class="info">처음 사용하시네요! 선생님 비밀번호를 설정해주세요.</div>
        <div class="form">
          <label>새 비밀번호</label>
          <input id="tl-pw"  type="password" placeholder="사용할 비밀번호 (4자 이상)" autocomplete="new-password" />
          <label>비밀번호 확인</label>
          <input id="tl-pw2" type="password" placeholder="동일하게 입력" autocomplete="new-password" />
          <div id="tl-err" class="err"></div>
          <button id="tl-btn" class="btn-dark btn-full" style="margin-top:4px">비밀번호 설정 후 로그인</button>
        </div>
      </div>
    </div>`;

  return `
    <div class="login-wrap">
      <div class="form-section">
        <div class="section-title">👩‍🏫 선생님 로그인</div>
        <div class="form">
          <label>비밀번호</label>
          <input id="tl-pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
          <div id="tl-err" class="err"></div>
          <button id="tl-btn" class="btn-dark btn-full" style="margin-top:4px">로그인</button>
        </div>
      </div>
    </div>`;
}

// ══════════════════════════
// 선생님 대시보드
// ══════════════════════════
function renderTeacher() {
  const tabs = `<div class="tabs">
    ${tabBtn('📤 파일 올리기',                        'upload',   teacherTab, "setTcTab('upload')")}
    ${tabBtn('📋 내 파일 관리',                        'myfiles',  teacherTab, "setTcTab('myfiles')")}
    ${tabBtn(`📨 학생 제출물<span class="badge">${studentFiles.length}</span>`, 'student', teacherTab, "setTcTab('student')")}
    ${tabBtn('🔐 비밀번호 변경',                       'settings', teacherTab, "setTcTab('settings')")}
  </div>`;

  let body = '';

  // 파일 올리기
  if (teacherTab === 'upload') {
    body = `
      <div class="form-section">
        <div class="section-title">학생에게 파일 공유하기</div>
        <div class="info">학생들이 로그인 없이 바로 다운로드할 수 있습니다. (최대 50MB)</div>
        <div class="form">
          <label>파일 선택</label>
          <input id="tc-file" type="file" />
          <div class="prog-wrap" id="tc-prog">
            <div class="prog-label">업로드 중... <span id="tc-pct">0%</span></div>
            <div class="prog-bar"><div class="prog-fill" id="tc-pfill" style="width:0%"></div></div>
          </div>
          <div id="tc-err" class="err"></div>
          <button id="tc-upload" class="btn-dark btn-full" style="margin-top:4px">학생에게 공유하기</button>
        </div>
      </div>`;

  // 내 파일 관리
  } else if (teacherTab === 'myfiles') {
    if (!teacherFiles.length) {
      body = '<div class="empty"><div class="empty-icon">📭</div>올린 파일이 없습니다.</div>';
    } else {
      const rows = teacherFiles.map(f => `
        <div class="card">
          <div class="card-icon">${fileIcon(f.name)}</div>
          <div style="flex:1;min-width:0">
            <div class="card-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
            <div class="card-meta">${fmtSize(f.size)} · ${fmtDate(f.uploadedAt)}</div>
          </div>
          <button class="btn-sm btn-danger" data-del="${f.id}" data-delpath="${esc(f.storagePath||'')}" data-delname="${esc(f.name)}">삭제</button>
        </div>`).join('');
      body = `<div class="card-stack">${rows}</div>`;
    }

  // 학생 제출물
  } else if (teacherTab === 'student') {
    if (!studentFiles.length) {
      body = '<div class="empty"><div class="empty-icon">📭</div>제출된 파일이 없습니다.</div>';
    } else {
      const rows = studentFiles.map(f => `
        <div class="sub-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="min-width:0">
              <div class="card-title">${esc(f.studentName)}</div>
              <div class="card-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)} · ${fmtSize(f.size)} · ${fmtDate(f.uploadedAt)}</div>
            </div>
            <button class="btn-sm btn-danger" data-sdel="${f.id}" data-sdelpath="${esc(f.storagePath||'')}" data-sname="${esc(f.studentName)}">삭제</button>
          </div>
          <div class="sub-pw-row">
            <input type="password" class="spw" data-id="${f.id}" placeholder="학생 비밀번호 입력" />
            <button class="sdl btn-dark btn-sm" data-id="${f.id}" data-name="${esc(f.name)}" data-ph="${f.passwordHash}">다운로드</button>
          </div>
          <div id="sderr-${f.id}" class="err" style="margin-top:6px"></div>
        </div>`).join('');
      body = `<div class="card-stack">${rows}</div>`;
    }

  // 비밀번호 변경
  } else if (teacherTab === 'settings') {
    body = `
      <div class="form-section" style="max-width:340px">
        <div class="section-title">비밀번호 변경</div>
        <div class="form">
          <label>현재 비밀번호</label>
          <input id="cp-cur" type="password" autocomplete="current-password" />
          <label>새 비밀번호 (4자 이상)</label>
          <input id="cp-new" type="password" autocomplete="new-password" />
          <label>새 비밀번호 확인</label>
          <input id="cp-con" type="password" autocomplete="new-password" />
          <div id="cp-msg" style="font-size:13px;min-height:16px"></div>
          <button id="cp-btn" class="btn-dark" style="margin-top:4px">비밀번호 변경</button>
        </div>
      </div>`;
  }

  return tabs + body;
}

// ══════════════════════════
// 이벤트 바인딩
// ══════════════════════════
function bindEvents() {

  // ① 학생 → 선생님 파일 다운로드
  document.querySelectorAll('[data-dl]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.dl;
      const f  = teacherFiles.find(x => x.id === id);
      btn.textContent = '...'; btn.disabled = true;
      try {
        const url = f.url || await storage.ref(f.storagePath).getDownloadURL();
        triggerDownload(f.name, url);
      } catch(e) { alert('다운로드 실패: ' + e.message); }
      btn.textContent = '다운로드'; btn.disabled = false;
    });
  });

  // ② 학생 제출
  const stSubmit = document.getElementById('st-submit');
  if (stSubmit) {
    stSubmit.addEventListener('click', async () => {
      const name = document.getElementById('st-name').value.trim();
      const pw   = document.getElementById('st-pw').value.trim();
      const file = document.getElementById('st-file').files[0];
      const err  = document.getElementById('st-err');

      if (!name) { err.textContent = '이름을 입력하세요.'; return; }
      if (!pw)   { err.textContent = '비밀번호를 설정하세요.'; return; }
      if (!file) { err.textContent = '파일을 선택하세요.'; return; }
      if (file.size > 50 * 1024 * 1024) { err.textContent = '50MB 이하 파일만 가능합니다.'; return; }

      err.textContent = '';
      stSubmit.disabled = true;
      document.getElementById('st-prog').style.display = 'block';

      try {
        const passwordHash = await sha256(pw);
        const id   = genId();
        const path = `studentFiles/${id}/${file.name}`;
        const ref  = storage.ref(path);
        const task = ref.put(file);

        await new Promise((res, rej) => {
          task.on('state_changed', snap => {
            const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
            document.getElementById('st-pct').textContent  = pct + '%';
            document.getElementById('st-pfill').style.width = pct + '%';
          }, rej, res);
        });

        const url = await ref.getDownloadURL();
        await db.ref(`studentFiles/${id}`).set({
          studentName: name, name: file.name, size: file.size,
          uploadedAt: new Date().toISOString(), passwordHash, storagePath: path, url
        });

        document.getElementById('st-form').innerHTML = `
          <div class="success-state">
            <div class="success-icon">✅</div>
            <div class="success-title">제출 완료!</div>
            <div class="success-sub">선생님만 비밀번호로 확인할 수 있습니다.</div>
            <button onclick="setStTab('download')" style="margin-top:18px">← 처음으로</button>
          </div>`;
      } catch(e) {
        err.textContent = '업로드 실패: ' + e.message;
        document.getElementById('st-prog').style.display = 'none';
        stSubmit.disabled = false;
      }
    });
  }

  // ③ 선생님 로그인
  const tlBtn = document.getElementById('tl-btn');
  if (tlBtn) {
    const doLogin = async () => {
      const pw  = document.getElementById('tl-pw').value;
      const err = document.getElementById('tl-err');
      tlBtn.textContent = '...'; tlBtn.disabled = true;
      try {
        if (isFirstSetup) {
          const pw2 = document.getElementById('tl-pw2').value;
          if (!pw || pw.length < 4) { err.textContent = '4자 이상 입력하세요.'; tlBtn.textContent = '비밀번호 설정 후 로그인'; tlBtn.disabled = false; return; }
          if (pw !== pw2)           { err.textContent = '비밀번호가 일치하지 않습니다.'; tlBtn.textContent = '비밀번호 설정 후 로그인'; tlBtn.disabled = false; return; }
          const h = await sha256(pw);
          await db.ref('auth/teacher').set({ h });
          isFirstSetup = false;
        } else {
          const h = await sha256(pw);
          const auth = await getAuth();
          if (!auth || auth.h !== h) { err.textContent = '비밀번호가 틀렸습니다.'; tlBtn.textContent = '로그인'; tlBtn.disabled = false; return; }
        }
        view = 'teacher';
        await loadAll();
        render();
      } catch(e) {
        err.textContent = '오류: ' + e.message;
        tlBtn.textContent = isFirstSetup ? '비밀번호 설정 후 로그인' : '로그인';
        tlBtn.disabled = false;
      }
    };
    tlBtn.addEventListener('click', doLogin);
    document.getElementById('tl-pw')?.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
  }

  // ④ 선생님 파일 업로드
  const tcUp = document.getElementById('tc-upload');
  if (tcUp) {
    tcUp.addEventListener('click', async () => {
      const file = document.getElementById('tc-file').files[0];
      if (!file) { alert('파일을 선택하세요.'); return; }
      if (file.size > 50 * 1024 * 1024) { document.getElementById('tc-err').textContent = '50MB 이하 파일만 가능합니다.'; return; }

      tcUp.disabled = true;
      document.getElementById('tc-prog').style.display = 'block';
      document.getElementById('tc-err').textContent = '';

      try {
        const id   = genId();
        const path = `teacherFiles/${id}/${file.name}`;
        const ref  = storage.ref(path);
        const task = ref.put(file);

        await new Promise((res, rej) => {
          task.on('state_changed', snap => {
            const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
            document.getElementById('tc-pct').textContent  = pct + '%';
            document.getElementById('tc-pfill').style.width = pct + '%';
          }, rej, res);
        });

        const url = await ref.getDownloadURL();
        await db.ref(`teacherFiles/${id}`).set({
          name: file.name, size: file.size,
          uploadedAt: new Date().toISOString(), storagePath: path, url
        });

        await loadTeacherFiles();
        teacherTab = 'myfiles';
        render();
      } catch(e) {
        document.getElementById('tc-err').textContent = '업로드 실패: ' + e.message;
        document.getElementById('tc-prog').style.display = 'none';
        tcUp.disabled = false;
      }
    });
  }

  // ⑤ 선생님 파일 삭제
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`"${btn.dataset.delname}" 을 삭제할까요?`)) return;
      btn.textContent = '...'; btn.disabled = true;
      try {
        if (btn.dataset.delpath) await storage.ref(btn.dataset.delpath).delete().catch(() => {});
        await db.ref(`teacherFiles/${btn.dataset.del}`).remove();
        await loadTeacherFiles();
        render();
      } catch(e) { alert('삭제 실패: ' + e.message); }
    });
  });

  // ⑥ 학생 파일 다운로드 (선생님)
  document.querySelectorAll('.sdl').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id  = btn.dataset.id;
      const ph  = btn.dataset.ph;
      const pw  = document.querySelector(`.spw[data-id="${id}"]`)?.value || '';
      const errEl = document.getElementById(`sderr-${id}`);
      if (!pw) { errEl.textContent = '비밀번호를 입력하세요.'; return; }
      btn.textContent = '...'; btn.disabled = true; errEl.textContent = '';
      try {
        const h = await sha256(pw);
        if (h !== ph) { errEl.textContent = '비밀번호가 틀렸습니다.'; btn.textContent = '다운로드'; btn.disabled = false; return; }
        const f   = studentFiles.find(x => x.id === id);
        const url = f.url || await storage.ref(f.storagePath).getDownloadURL();
        triggerDownload(f.name, url);
      } catch(e) { errEl.textContent = '다운로드 실패: ' + e.message; }
      btn.textContent = '다운로드'; btn.disabled = false;
    });
  });

  document.querySelectorAll('.spw').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.querySelector(`.sdl[data-id="${inp.dataset.id}"]`)?.click();
    });
  });

  // ⑦ 학생 파일 삭제 (선생님)
  document.querySelectorAll('[data-sdel]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`"${btn.dataset.sname}"의 파일을 삭제할까요?`)) return;
      btn.textContent = '...'; btn.disabled = true;
      try {
        if (btn.dataset.sdelpath) await storage.ref(btn.dataset.sdelpath).delete().catch(() => {});
        await db.ref(`studentFiles/${btn.dataset.sdel}`).remove();
        await loadStudentFiles();
        render();
      } catch(e) { alert('삭제 실패: ' + e.message); }
    });
  });

  // ⑧ 비밀번호 변경
  const cpBtn = document.getElementById('cp-btn');
  if (cpBtn) {
    cpBtn.addEventListener('click', async () => {
      const cur = document.getElementById('cp-cur').value;
      const nw  = document.getElementById('cp-new').value;
      const con = document.getElementById('cp-con').value;
      const msg = document.getElementById('cp-msg');
      const setMsg = (t, ok) => { msg.style.color = ok ? '#166534' : '#b91c1c'; msg.textContent = t; };

      if (!cur || !nw || !con)  { setMsg('모두 입력해주세요.', false); return; }
      if (nw !== con)           { setMsg('새 비밀번호가 일치하지 않습니다.', false); return; }
      if (nw.length < 4)        { setMsg('4자 이상 입력하세요.', false); return; }

      cpBtn.disabled = true;
      try {
        const curH = await sha256(cur);
        const auth = await getAuth();
        if (!auth || auth.h !== curH) { setMsg('현재 비밀번호가 틀렸습니다.', false); cpBtn.disabled = false; return; }
        await db.ref('auth/teacher').set({ h: await sha256(nw) });
        setMsg('✓ 비밀번호가 변경되었습니다.', true);
        ['cp-cur','cp-new','cp-con'].forEach(id => document.getElementById(id).value = '');
      } catch(e) { setMsg('오류: ' + e.message, false); }
      cpBtn.disabled = false;
    });
  }
}

init();
</script>
</body>
</html>
